<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>呼吸治療組班表公告網頁</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        background: #f3f7fa;
        color: #102033;
        font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
        overflow-x: hidden;
      }
      main {
        width: min(calc(100vw - 32px), 560px);
        padding: clamp(20px, 6vw, 32px);
        border: 1px solid #d8e3ed;
        border-radius: 20px;
        background: #fff;
        text-align: center;
        box-shadow: 0 18px 48px rgba(15, 37, 55, 0.10);
      }
      h1 { margin: 0 0 12px; font-size: clamp(22px, 6vw, 28px); line-height: 1.25; overflow-wrap: anywhere; }
      p { color: #587089; line-height: 1.7; overflow-wrap: anywhere; }
      img { width: min(72vw, 320px); max-width: 100%; height: auto; margin: 18px auto; display: block; }
      a { color: #0f766e; display: inline-block; font-weight: 700; max-width: 100%; overflow-wrap: anywhere; word-break: break-word; }
      .meta { margin-top: 18px; font-size: 14px; color: #789; }
    </style>
  </head>
  <body>
    <main>
      <h1>呼吸治療組班表公告網頁</h1>
      <p>請用手機掃描 QR code，或直接開啟下方網址。</p>
      <img src="staff-site-qr.png" alt="人員網頁 QR code" />
      <p><a href="https://huangph518-source.github.io/rt-schedule-site/">https://huangph518-source.github.io/rt-schedule-site/</a></p>
      <p class="meta">更新時間：2026-06-08 12:20:28</p>
    </main>
  </body>
</html>
